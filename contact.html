<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <title>Marioclub Contact</title>
</head>

<body>
    <header>
        <a href="index.html"><h1>Marioclub</h1></a>
    </header>
    <section class="banner">
        <img src="img/banner.jpg" alt="marioclub welcome banner">

        <div class="welcome">
            <h2>Get in Touch<br><span>with Marioclub</span></h2>
        </div>
    </section>
    <nav class="main-nav">
        <ul>
            <a href="index.html"><li>Join the club</li></a>
            <a href="news.html"><li>Latest news</li></a>
            <a href="games.html"><li>New games</li></a>
            <a href="contact.html"><li>Contact</li></a>
        </ul>
    </nav>
    <main>
        <article>
            <h2>Get in touch with me, Mario</h2>
            <form>
                <input type="text" placeholder="Type Firstname" name="fname" required>
                <input type="text" placeholder="Type Lastname" name="lname" required>
                <br>
                <input type="email" placeholder="Type E-mail" name="mail" required>
                <input list="countries" name="country" id="country">
                <datalist id="countries">
                    <option value="Albania">
                    <option value="Austria">
                    <option value="Belarus">
                    <option value="Belgium">
                    <option value="Bosnia">
                    <option value="Bulgaria">
                    <option value="Croatia">
                    <option value="Czech Republic">
                    <option value="Denmark">
                    <option value="Finland">
                    <option value="France">
                    <option value="Georgia">
                    <option value="Germany">
                    <option value="Greece">
                    <option value="Hungary">
                    <option value="Ireland">
                    <option value="Italy">
                    <option value="Kazakhstan">
                    <option value="Lithuania">
                    <option value="Netherlands">
                    <option value="Norway">
                    <option value="Poland">
                    <option value="Portugal">
                    <option value="Romania">
                    <option value="Russia">
                    <option value="Serbia">
                    <option value="Slovakia">
                    <option value="Spain">
                    <option value="Turkey">
                    <option value="Sweden">
                    <option value="Switzerland">
                    <option value="Ukraine">
                    <option value="United Kingdom">
                </datalist>
                <br />
                <textarea name="question" id="textarea" rows="4" cols="40" placeholder="Ask a question"></textarea>
                <input type="submit" value="Get in touch">

            </form>
        </article>
        <ul class="images">
            <!--- Add an image tag inside <li> tag that displays image "thumb-1.jpg" and add an alt-attribute with following text "mario thumbnail 1 --->
            <li></li>
            <!--- Add an image tag inside <li> tag that displays image "thumb-2.jpg" and add an alt-attribute with following text "mario thumbnail 2 --->
            <li></li>
        </ul>
    </main>
    <section class="join">
        <h2>Contact Us today!</h2>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Corporis dignissimos minus voluptatem.</p>
        <form>
            <input type="email" name="email" placeholder="Type email & hit enter" required>
        </form>

    </section>
    <footer>
        <p class="copyright">Copyright 2019 Marioclub</p>
    </footer>
</body>

</html>
